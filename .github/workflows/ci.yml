name: DocuMark CI Pipeline

# 1. THE TRIGGER: When does this run?
on:
  push:
    branches: [ "main" ] # Change to "master" if that is your default branch
  pull_request:
    branches: [ "main" ]

# 2. THE JOBS: What should the server do?
jobs:
  build-and-test:
    # Spin up a fresh Linux server in the cloud
    runs-on: ubuntu-latest

    steps:
    # Step A: Download your code onto the server
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step B: Install the .NET 8 SDK
    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    # Step C: Prove the C# backend compiles without errors
    - name: Compile Backend
      working-directory: ./backend
      run: dotnet build --configuration Release

    # Step D: Install Node.js
    - name: Setup Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: 18

    # Step E: Prove the Next.js frontend builds without errors
    - name: Compile Frontend
      working-directory: ./frontend
      run: |
        npm install
        npm run build

    # Step F: The Ultimate Test - Do the Docker containers still build?
    - name: Test Docker Orchestration
      run: docker-compose build